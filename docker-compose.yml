services:
  postgres:
    image: postgres:16-alpine
    container_name: socialhub-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: socialhub
      POSTGRES_PASSWORD: socialhub
      POSTGRES_DB: socialhub
    volumes:
      - socialhub_pgdata:/var/lib/postgresql/data

volumes:
  socialhub_pgdata:
